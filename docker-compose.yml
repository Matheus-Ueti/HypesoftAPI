version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASS:-admin}
    depends_on:
      - mongodb

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8080:8080"
    volumes:
      - C:/Users/Mathe/Desktop/PastaDeProgramas/CSharp/HypesoftFront/keycloak:/opt/keycloak/data/import:ro
      - keycloak_data:/opt/keycloak/data

  api:
    build: .
    container_name: hypesoft-api
    expose:
      - "5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      MongoDB__ConnectionString: mongodb://mongodb:27017
      MongoDB__DatabaseName: ${MONGO_DATABASE:-hypesoft}
      Keycloak__Authority: http://localhost:8080/realms/${KEYCLOAK_REALM:-shopsense}
      Keycloak__MetadataAddress: http://keycloak:8080/realms/${KEYCLOAK_REALM:-shopsense}
      Keycloak__ClientId: ${KEYCLOAK_CLIENT_ID:-shopsense-api}
    depends_on:
      - mongodb
      - keycloak

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "5000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

volumes:
  mongo_data:
  keycloak_data:
